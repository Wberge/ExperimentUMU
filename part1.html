<!DOCTYPE html>
<html>
<head>
  <title>Vividness Rating Task</title>

  <script src="https://unpkg.com/jspsych@8.2.2"></script>
  <script src="https://unpkg.com/fabric@7.1.0/dist/index.min.js"></script>

  <script src="https://unpkg.com/@jspsych/plugin-preload@2.1.0"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-button-response@2.1.0"></script>
  <script src="https://unpkg.com/@jspsych/plugin-canvas-keyboard-response@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-survey-html-form@2.1.0"></script>

  <link href="https://unpkg.com/jspsych@8.2.2/css/jspsych.css" rel="stylesheet" type="text/css" />
</head>
<body></body>

<script>
  const jsPsych = initJsPsych({
    on_finish: () => {
      jsPsych.data.displayData();
      jsPsych.data.get().localSave('csv', 'vividness_test.csv');
    }
  });

  const canvas_size = [400, 400];
  const noise_imgs_dim = [250, 250];
  const gabor_img_dim = [250, 250];
  const single_frame_duration = 100;
  const dynamic_noise_duration = 2000;

  const n_imagery_trials = 5;
  const hidden_stimulus_trial_index = 6;
  const total_trials = 6;
  const hidden_stimulus_opacity = 0.11;

  const vividness_opacities = [0.12, 0.28, 0.44, 0.60, 0.78];

  // -----------------------------
  // PRELOAD
  // -----------------------------
  const noise_files = [];
  for (let i = 0; i < 50; i++) {
    noise_files.push(`imgs/rand_noise_${i}.png`);
  }

  const preload = {
    type: jsPsychPreload,
    images: [...noise_files, 'imgs/gabor_left.png', 'imgs/gabor_right.png']
  };

  // -----------------------------
  // PREPARE NOISE IMAGES
  // -----------------------------
  let fabric_noise_imgs = [];

  for (let i = 0; i < 50; i++) {
    const img = new Image();
    img.src = `imgs/rand_noise_${i}.png`;

    const fabric_img = new fabric.Image(img, {
      left: 0,
      top: 0,
      width: noise_imgs_dim[0],
      height: noise_imgs_dim[1],
      originX: 'left',
      originY: 'top'
    });

    fabric_img.scaleToWidth(canvas_size[0]);
    fabric_noise_imgs.push(fabric_img);
  }

  // -----------------------------
  // PREPARE GABOR IMAGES
  // -----------------------------
  const gabor_left_img = new Image();
  gabor_left_img.src = 'imgs/gabor_left.png';

  const gabor_right_img = new Image();
  gabor_right_img.src = 'imgs/gabor_right.png';

  function makeFabricGabor(imageObj, opacity) {
    const gabor = new fabric.Image(imageObj, {
      left: canvas_size[0] / 2,
      top: canvas_size[1] / 2,
      width: gabor_img_dim[0],
      height: gabor_img_dim[1],
      opacity: opacity,
      originX: 'center',
      originY: 'center'
    });
    gabor.scaleToWidth(canvas_size[0]);
    return gabor;
  }

  function getGaborFile(orientation) {
    return orientation === 'left' ? 'imgs/gabor_left.png' : 'imgs/gabor_right.png';
  }

  function getGaborImageObject(orientation) {
    return orientation === 'left' ? gabor_left_img : gabor_right_img;
  }

  // -----------------------------
  // RANDOMIZED ORIENTATIONS
  // -----------------------------
  let trial_orientations = jsPsych.randomization.repeat(['left', 'right'], Math.ceil(total_trials / 2));
  trial_orientations = jsPsych.randomization.shuffle(trial_orientations).slice(0, total_trials);

  // -----------------------------
  // INSTRUCTION
  // -----------------------------
  function make_instruction_trial(trial_index, orientation) {
    return {
      type: jsPsychHtmlButtonResponse,
      stimulus: `
        <div style="max-width:800px; margin:0 auto; text-align:center;">
          <p>Try to imagine the following <strong>${orientation}-tilted grating</strong> as vividly as possible.</p>
          <img src="${getGaborFile(orientation)}" style="width:220px; height:220px; margin:20px 0;">
          <p>You will then see moving noise.</p>
          <p>After that, choose the example that best matches how vivid your mental image was.</p>
        </div>
      `,
      choices: ['Start'],
      data: {
        phase: "instruction",
        trial_index: trial_index,
        imagined_tilt: orientation
      }
    };
  }

  // -----------------------------
  // NOISE TRIAL
  // -----------------------------
  function make_noise_trial(trial_index, orientation, show_hidden_stimulus = false) {
    let interval_ID;

    return {
      type: jsPsychCanvasKeyboardResponse,
      canvas_size: canvas_size,
      trial_duration: dynamic_noise_duration,
      choices: "NO_KEYS",
      stimulus: function() {
        const shuffled_noise = jsPsych.randomization.shuffle([...fabric_noise_imgs]);

        const canvas = new fabric.StaticCanvas("jspsych-canvas-stimulus", {
          backgroundColor: 'white'
        });

        const gabor_image_obj = getGaborImageObject(orientation);
        const hidden_gabor = makeFabricGabor(gabor_image_obj, hidden_stimulus_opacity);

        let nth_frame = 0;

        interval_ID = setInterval(() => {
          canvas.remove(...canvas.getObjects());
          canvas.add(shuffled_noise[nth_frame]);

          if (show_hidden_stimulus) {
            canvas.add(hidden_gabor);
          }

          canvas.renderAll();
          nth_frame = (nth_frame + 1) % shuffled_noise.length;
        }, single_frame_duration);
      },
      data: {
        phase: "noise",
        trial_index: trial_index,
        imagined_tilt: orientation,
        hidden_real_stimulus_present: show_hidden_stimulus ? 1 : 0,
        hidden_real_stimulus_opacity: show_hidden_stimulus ? hidden_stimulus_opacity : 0
      },
      on_finish: function(data) {
        clearInterval(interval_ID);
      }
    };
  }

  // -----------------------------
  // VIVIDNESS RATING TRIAL
  // -----------------------------
  function make_vividness_trial(trial_index, orientation, show_hidden_stimulus = false) {
    const gabor_file = getGaborFile(orientation);

    return {
      type: jsPsychSurveyHtmlForm,
      preamble: `
        <div style="text-align:center; max-width:1000px; margin:0 auto;">
          <p style="font-size:22px;">How vivid was the image you imagined?</p>
          <p>Select the example that best matches your imagery.</p>
        </div>
      `,
      html: `
        <div style="
          display:flex;
          justify-content:center;
          gap:20px;
          flex-wrap:wrap;
          max-width:1100px;
          margin:20px auto 0 auto;
        ">

          <label style="cursor:pointer; text-align:center;">
            <input type="radio" name="vividness" value="1" required>
            <div style="
              position:relative;
              width:140px;
              height:140px;
              margin-top:8px;
              border:2px solid #bbb;
              border-radius:8px;
              overflow:hidden;
              background-image:url('imgs/rand_noise_0.png');
              background-size:cover;
            ">
              <img src="${gabor_file}"
                   style="position:absolute; top:0; left:0; width:100%; height:100%; opacity:0.12;">
            </div>
            <div style="margin-top:8px;">1</div>
          </label>

          <label style="cursor:pointer; text-align:center;">
            <input type="radio" name="vividness" value="2" required>
            <div style="
              position:relative;
              width:140px;
              height:140px;
              margin-top:8px;
              border:2px solid #bbb;
              border-radius:8px;
              overflow:hidden;
              background-image:url('imgs/rand_noise_0.png');
              background-size:cover;
            ">
              <img src="${gabor_file}"
                   style="position:absolute; top:0; left:0; width:100%; height:100%; opacity:0.28;">
            </div>
            <div style="margin-top:8px;">2</div>
          </label>

          <label style="cursor:pointer; text-align:center;">
            <input type="radio" name="vividness" value="3" required>
            <div style="
              position:relative;
              width:140px;
              height:140px;
              margin-top:8px;
              border:2px solid #bbb;
              border-radius:8px;
              overflow:hidden;
              background-image:url('imgs/rand_noise_0.png');
              background-size:cover;
            ">
              <img src="${gabor_file}"
                   style="position:absolute; top:0; left:0; width:100%; height:100%; opacity:0.44;">
            </div>
            <div style="margin-top:8px;">3</div>
          </label>

          <label style="cursor:pointer; text-align:center;">
            <input type="radio" name="vividness" value="4" required>
            <div style="
              position:relative;
              width:140px;
              height:140px;
              margin-top:8px;
              border:2px solid #bbb;
              border-radius:8px;
              overflow:hidden;
              background-image:url('imgs/rand_noise_0.png');
              background-size:cover;
            ">
              <img src="${gabor_file}"
                   style="position:absolute; top:0; left:0; width:100%; height:100%; opacity:0.60;">
            </div>
            <div style="margin-top:8px;">4</div>
          </label>

          <label style="cursor:pointer; text-align:center;">
            <input type="radio" name="vividness" value="5" required>
            <div style="
              position:relative;
              width:140px;
              height:140px;
              margin-top:8px;
              border:2px solid #bbb;
              border-radius:8px;
              overflow:hidden;
              background-image:url('imgs/rand_noise_0.png');
              background-size:cover;
            ">
              <img src="${gabor_file}"
                   style="position:absolute; top:0; left:0; width:100%; height:100%; opacity:0.78;">
            </div>
            <div style="margin-top:8px;">5</div>
          </label>

        </div>
      `,
      button_label: "Continue",
      data: {
        phase: "vividness_rating",
        trial_index: trial_index,
        imagined_tilt: orientation,
        hidden_real_stimulus_present: show_hidden_stimulus ? 1 : 0
      },
      on_finish: function(data) {
        const response = data.response;
        data.vividness_rating = Number(response.vividness);
        data.selected_opacity = vividness_opacities[data.vividness_rating - 1];
      }
    };
  }

  // -----------------------------
  // AWARENESS CHECK AT END
  // -----------------------------
const awareness_check = {
  type: jsPsychSurveyHtmlForm,
  preamble: `
    <div style="max-width:900px; margin:0 auto; text-align:center;">
      <p style="font-size:22px;">Final question</p>
      <p>In the last trial, did you see a real grating in the noise?</p>
    </div>
  `,
  html: `
    <div style="max-width:700px; margin:30px auto; text-align:left;">

      <p>
        <label>
          <input type="radio" name="noticed_real_stimulus_last_trial" value="yes" required>
          Yes
        </label>
      </p>

      <p>
        <label>
          <input type="radio" name="noticed_real_stimulus_last_trial" value="no" required>
          No
        </label>
      </p>

    </div>
  `,
  button_label: "Continue",
  data: {
    phase: "awareness_check",
    actual_hidden_stimulus_trial: hidden_stimulus_trial_index
  },
  on_finish: function(data) {
    const response = data.response;
    data.noticed_real_stimulus_last_trial = response.noticed_real_stimulus_last_trial || "";
    data.correct_detection_last_trial =
      response.noticed_real_stimulus_last_trial === "yes" ? 1 : 0;
  }
};
// -----------------------------
// DEMOGRAPHICS
// -----------------------------
const demographics = {
  type: jsPsychSurveyHtmlForm,
  preamble: `
    <div style="max-width:700px; margin:0 auto; text-align:center;">
      <p style="font-size:22px;">A few questions before we start</p>
    </div>
  `,
  html: `
    <div style="max-width:500px; margin:20px auto; text-align:left;">

      <p>
        Age:<br>
        <input type="number" name="age" min="5" max="100" required>
      </p>

      <p>
        Gender:<br>
        <label><input type="radio" name="gender" value="male" required> Male</label><br>
        <label><input type="radio" name="gender" value="female" required> Female</label><br>
        <label><input type="radio" name="gender" value="other" required> Other</label>
      </p>

    </div>
  `,
  button_label: "Continue",
  data: {
    phase: "demographics"
  },
  on_finish: function(data) {
    const response = data.response;
    data.age = Number(response.age);
    data.gender = response.gender;
  }
};
  // -----------------------------
  // BUILD TIMELINE
  // -----------------------------
  const timeline = [preload, demographics];

  for (let t = 0; t < total_trials; t++) {
    const trial_index = t + 1;
    const orientation = trial_orientations[t];
    const show_hidden_stimulus = (trial_index === hidden_stimulus_trial_index);

    timeline.push(make_instruction_trial(trial_index, orientation));
    timeline.push(make_noise_trial(trial_index, orientation, show_hidden_stimulus));
    timeline.push(make_vividness_trial(trial_index, orientation, show_hidden_stimulus));
  }

  timeline.push(awareness_check);

  jsPsych.run(timeline);
</script>
</html>
